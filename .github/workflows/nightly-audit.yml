name: Nightly Lighthouse Audit

on:
  schedule:
    - cron: "0 3 * * *" # 3am UTC = 4am or 5am Amsterdam time
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Unlighthouse CI
        run: npm install -g unlighthouse-ci

      - name: Run Unlighthouse
        run: unlighthouse-ci --site https://www.queerbadmintonamsterdam.nl --config unlighthouse.config.ts

      - name: Upload report
        if: always() # upload even if audit "fails" due to budget
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.run_id }}
          path: .unlighthouse/
          retention-days: 30

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Lighthouse audit failed — ${new Date().toISOString().slice(0, 10)}`,
              body: `The nightly Lighthouse audit failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['audit-failure'],
            })
